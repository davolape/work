events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 81;

        location / {
            include /etc/nginx/fastcgi_params;
            fastcgi_pass 127.0.0.1:8080;
            fastcgi_param SCRIPT_FILENAME /app/server;
        }

        location /status {
            stub_status;
            access_log off;
	}
    }
}

